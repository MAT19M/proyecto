<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Matías Aguilar Julio César">
  <title>Mi Perfil - Proyectos Integrados</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }
    header {
      text-align: center;
      margin-bottom: 10px;
    }
    h1 {
      margin: 5px 0;
    }
    .author-tag {
      font-style: italic;
      opacity: 0.8;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 600px;
    }
    .card {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 15px;
      border: 1px solid rgba(128, 128, 128, 0.3);
      border-radius: 8px;
      background-color: rgba(128, 128, 128, 0.05);
    }
    iframe {
      max-width: 100%;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Panel Integrado</h1>
    <p class="author-tag">Por: Matías Aguilar Julio César</p>
  </header>

  <main class="container">

    <section class="card">
      <h2>Mi Dirección</h2>
      <iframe
        src="Tercera Avenida 14, Evolucion, 57700 Cdad. Nezahualcóyotl, Méx., México"
        width="100%" height="450" style="border:0;"
        allowfullscreen="" loading="lazy"></iframe>
    </section>

    <section class="card">
      <h2>Mi Facebook</h2>
      <iframe
        src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Fshare%2F1BLGixcPrh%2F&tabs=timeline&width=340&height=500&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true"
        width="340" height="500"
        style="border:none; overflow:hidden;"
        scrolling="no" frameborder="0" allowTransparency="true"
        allow="encrypted-media"></iframe>
    </section>

    <section class="card">
      <h2>Mi Video de YouTube</h2>
      <iframe width="100%" height="315"
        src="https://www.youtube.com/embed/2TRQm6atHXY?si=EbYgIYcq_XsofVit"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </section>

  </main>

</body>
</html>
