<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Matías Aguilar Julio César">
  <title>Mi Perfil - Proyectos Integrados</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }
    header {
      text-align: center;
      margin-bottom: 10px;
    }
    h1 {
      margin: 5px 0;
    }
    .author-tag {
      font-style: italic;
      opacity: 0.8;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 600px;
    }
    .card {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding: 20px;
      border: 1px solid rgba(128, 128, 128, 0.3);
      border-radius: 8px;
      background-color: rgba(128, 128, 128, 0.05);
      box-sizing: border-box;
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #0076ff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background 0.2s;
    }
    .btn:hover {
      background-color: #0056b3;
    }
    iframe {
      width: 100%;
      max-width: 100%;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Panel Integrado</h1>
    <p class="author-tag">Por: Matías Aguilar Julio César</p>
  </header>

  <main class="container">

    <section class="card">
      <h2>Mi Ubicación</h2>
      <p>Haz clic abajo para abrir la ubicación directamente en Google Maps:</p>
      <a class="btn" href="https://maps.app.goo.gl/GLtN3cT8hTbFRFW8A" target="_blank">Ver Mapa</a>
    </section>

    <section class="card">
      <h2>Mi Facebook</h2>
      <p>Visita mi perfil o contenido compartido en Facebook:</p>
      <a class="btn" href="https://www.facebook.com/share/1GV3QioHFT/" target="_blank">Ir a Facebook</a>
    </section>

    <section class="card">
      <h2>Mi Video de YouTube</h2>
      <iframe height="315"
        src="https://www.youtube.com/embed/tqOk-I7bYXs"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </section>

  </main>

</body>
</html>
